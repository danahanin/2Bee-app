openapi: 3.0.3

info:
  title: 2Bee API
  description: |
    API specification for the 2Bee shared finance application.
    Profile & Settings stubs live under /api (Dana Hanin).
    Dashboard & Analytics endpoints are at the server root (Mishelle — PR1).
    Remaining API groups will be added by each domain owner as per plan.md.
  version: 0.1.0-stubs

servers:
  - url: http://localhost:4000/api
    description: Profile API (path prefix /api)
  - url: http://localhost:4000
    description: Root API (dashboard, hive, expenses, auth)

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer access token (opaque session token) issued by POST /auth/login.
        Include as: Authorization: Bearer <token>

  # ---------------------------------------------------------------------------
  # Reusable schemas
  # ---------------------------------------------------------------------------
  schemas:

    PrivacySettings:
      type: object
      properties:
        hidePersonalIncome:
          type: boolean
          description: When true, the user's personal income is not visible to their partner.
          example: false
        hidePersonalExpenses:
          type: boolean
          description: When true, personal-type expenses are hidden from the partner.
          example: false
        hidePersonalBalance:
          type: boolean
          description: When true, personal account balance is hidden from the partner.
          example: false
      required:
        - hidePersonalIncome
        - hidePersonalExpenses
        - hidePersonalBalance

    NotificationSettings:
      type: object
      properties:
        budgetAlerts:
          type: boolean
          description: Notify when approaching or exceeding a budget limit.
          example: true
        imbalanceAlerts:
          type: boolean
          description: Notify when Hive contributions become imbalanced.
          example: true
        newExpenseAlerts:
          type: boolean
          description: Notify when partner adds a new shared expense.
          example: true
        weeklyDigest:
          type: boolean
          description: Send a weekly financial summary.
          example: false
      required:
        - budgetAlerts
        - imbalanceAlerts
        - newExpenseAlerts
        - weeklyDigest

    UserProfile:
      type: object
      properties:
        id:
          type: string
          example: user_demo_1
        firstName:
          type: string
          example: Dana
        lastName:
          type: string
          example: Hanin
        email:
          type: string
          format: email
          example: dana@2bee.app
        avatarUrl:
          type: string
          nullable: true
          example: null
        bio:
          type: string
          maxLength: 200
          example: ''
        pairedWith:
          type: string
          nullable: true
          description: Display name of the paired partner, or null if unpaired.
          example: Jane
        hiveId:
          type: string
          nullable: true
          example: hive_demo_1

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 50
          example: Dana
        lastName:
          type: string
          minLength: 1
          maxLength: 50
          example: Hanin
        avatarUrl:
          type: string
          nullable: true
          example: null
        bio:
          type: string
          maxLength: 200
          example: Saving for a vacation together.

    UpdateSharedCategoriesRequest:
      type: object
      required:
        - categories
      properties:
        categories:
          type: array
          items:
            type: string
            enum:
              - groceries
              - rent
              - utilities
              - dining
              - transport
              - entertainment
              - travel
              - health
              - subscriptions
              - shopping
          minItems: 0
          maxItems: 20
          example:
            - groceries
            - rent
            - utilities

    ReconnectPairRequest:
      type: object
      properties:
        partnerCode:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-character alphanumeric pair code generated by the partner.
          example: AB12CD
        partnerId:
          type: string
          description: MongoDB ObjectId of the partner (alternative to partnerCode).
          example: 64a1b2c3d4e5f6a7b8c9d0e1
      description: Provide either partnerCode or partnerId — not both.

    AuthUser:
      type: object
      properties:
        id:
          type: string
          example: user_demo_1
        firstName:
          type: string
          example: Demo
        lastName:
          type: string
          example: User
        email:
          type: string
          format: email
          example: demo@2bee.app
        pairId:
          type: string
          nullable: true
          example: null
        hiveId:
          type: string
          nullable: true
          example: hive_demo_1
        createdAt:
          type: string
          format: date-time
          example: 2024-06-01T09:00:00.000Z
      required:
        - id
        - firstName
        - lastName
        - email
        - createdAt

    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
          example: Demo
        lastName:
          type: string
          minLength: 2
          maxLength: 50
          example: User
        email:
          type: string
          format: email
          example: demo@2bee.app
        password:
          type: string
          format: password
          minLength: 8
          example: hunter22

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: demo@2bee.app
        password:
          type: string
          format: password
          example: hunter22

    RegisterResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: 51e4b5830a2743aabf98c5404f4f894c
        expiresAt:
          type: string
          format: date-time
          example: 2024-06-01T09:15:00.000Z
        user:
          $ref: '#/components/schemas/AuthUser'

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: UNAUTHORIZED
            message:
              type: string
              example: Missing or invalid authorization token.
            details:
              type: object
              nullable: true
              additionalProperties:
                type: string

    DashboardTopCategory:
      type: object
      nullable: true
      properties:
        category:
          type: string
          example: dining
        amount:
          type: number
          example: 245.5

    BudgetStatusItem:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        period:
          type: string
          enum: [monthly, weekly, yearly]
        type:
          type: string
          enum: [personal, shared]
        limit:
          type: number
        spent:
          type: number
        percentUsed:
          type: integer
          minimum: 0
          maximum: 100

    PersonalDashboardResponse:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        hiveId:
          type: string
          nullable: true
        totalSpendThisMonth:
          type: number
        topCategory:
          $ref: '#/components/schemas/DashboardTopCategory'
        budgetStatus:
          type: array
          items:
            $ref: '#/components/schemas/BudgetStatusItem'
        insightPlaceholder:
          type: string
          nullable: true
          description: Reserved for PR5 — embedded AI insight.

    SharedDashboardContribution:
      type: object
      properties:
        userId:
          type: string
        total:
          type: number

    SharedDashboardResponse:
      type: object
      properties:
        paired:
          type: boolean
        period:
          type: object
          nullable: true
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        hiveId:
          type: string
          nullable: true
        totalJointSpendThisMonth:
          type: number
        topSharedCategory:
          $ref: '#/components/schemas/DashboardTopCategory'
        contributions:
          type: array
          items:
            $ref: '#/components/schemas/SharedDashboardContribution'
        sharedBudgetStatus:
          type: array
          items:
            $ref: '#/components/schemas/BudgetStatusItem'
        message:
          type: string
          nullable: true
          description: Present when the user has no hive.

# ---------------------------------------------------------------------------
# Apply bearer auth globally to all endpoints
# ---------------------------------------------------------------------------
security:
  - bearerAuth: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # --------------------------------------------------------------------------
  # Authentication — Bar Cohen (PR1)
  # --------------------------------------------------------------------------
  /auth/register:
    post:
      summary: Register a new user account
      description: Creates an account with hashed password storage and returns the sanitized user profile.
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login with email and password
      description: Verifies credentials with bcrypt and issues a short-lived access token.
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Credentials verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout and invalidate the current access token
      description: Accepts the Bearer token and removes the associated session record.
      operationId: logoutUser
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session invalidated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Missing token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Dashboard & Analytics (Mishelle — PR1)
  # --------------------------------------------------------------------------
  /dashboard/personal:
    servers:
      - url: http://localhost:4000
    get:
      summary: Personal dashboard summary
      description: |
        Aggregates the current user's personal expenses for the current calendar month (UTC),
        top spending category, and budget rollups. AI insight embedding is added in PR5.
      operationId: getDashboardPersonal
      tags:
        - Dashboard & Analytics
      responses:
        '200':
          description: Personal dashboard summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalDashboardResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboard/shared:
    servers:
      - url: http://localhost:4000
    get:
      summary: Shared (Hive) dashboard summary
      description: |
        Joint spending for the current month, per-partner contributions, and shared budgets.
        When the user has no hive, returns paired=false and a short message.
      operationId: getDashboardShared
      tags:
        - Dashboard & Analytics
      responses:
        '200':
          description: Shared dashboard summary or unpaired placeholder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedDashboardResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Hive not found or user is not a member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Profile
  # --------------------------------------------------------------------------
  /profile:
    get:
      summary: Get current user's profile
      description: Returns the authenticated user's full profile including pairing status.
      operationId: getProfile
      tags:
        - Profile & Settings
      responses:
        '200':
          description: User profile returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: user_demo_1
                firstName: Dana
                lastName: Hanin
                email: dana@2bee.app
                avatarUrl: null
                bio: ''
                pairedWith: Jane
                hiveId: hive_demo_1
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update current user's profile
      description: Updates one or more profile fields (firstName, lastName, avatarUrl, bio).
      operationId: updateProfile
      tags:
        - Profile & Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              firstName: Dana
              lastName: Hanin
              bio: Saving for a vacation together.
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error — invalid field value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "firstName must be at most 50 characters"
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Privacy settings
  # --------------------------------------------------------------------------
  /settings/privacy:
    get:
      summary: Get privacy settings
      description: Returns the current user's privacy configuration.
      operationId: getPrivacySettings
      tags:
        - Profile & Settings
      responses:
        '200':
          description: Privacy settings returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettings'
              example:
                hidePersonalIncome: false
                hidePersonalExpenses: false
                hidePersonalBalance: false
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update privacy settings
      description: Updates one or more privacy flags. Only the provided fields are changed.
      operationId: updatePrivacySettings
      tags:
        - Profile & Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacySettings'
            example:
              hidePersonalIncome: true
      responses:
        '200':
          description: Privacy settings updated successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      privacySettings:
                        $ref: '#/components/schemas/PrivacySettings'
        '400':
          description: Validation error — non-boolean value provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Notification settings
  # --------------------------------------------------------------------------
  /settings/notifications:
    get:
      summary: Get notification preferences
      description: Returns the current user's notification configuration.
      operationId: getNotificationSettings
      tags:
        - Profile & Settings
      responses:
        '200':
          description: Notification settings returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'
              example:
                budgetAlerts: true
                imbalanceAlerts: true
                newExpenseAlerts: true
                weeklyDigest: false
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update notification preferences
      description: Updates one or more notification flags. Only provided fields are changed.
      operationId: updateNotificationSettings
      tags:
        - Profile & Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSettings'
            example:
              weeklyDigest: true
      responses:
        '200':
          description: Notification settings updated successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      notificationSettings:
                        $ref: '#/components/schemas/NotificationSettings'
        '400':
          description: Validation error — non-boolean value provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Shared categories
  # --------------------------------------------------------------------------
  /settings/shared-categories:
    put:
      summary: Update shared expense categories
      description: |
        Replaces the user's shared expense category list entirely.
        Expenses in these categories will be automatically suggested as shared
        by the AI classifier (Dan Shemesh — Sprint 3).
      operationId: updateSharedCategories
      tags:
        - Profile & Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSharedCategoriesRequest'
            example:
              categories:
                - groceries
                - rent
                - dining
      responses:
        '200':
          description: Shared categories updated successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      sharedCategories:
                        type: array
                        items:
                          type: string
                        example:
                          - groceries
                          - rent
                          - dining
        '400':
          description: Validation error — unknown category or invalid format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Pairing management
  # --------------------------------------------------------------------------
  /pair:
    delete:
      summary: Disconnect from partner
      description: |
        Unlinks the current user from their partner.
        Both users' pairId and hiveId are cleared.
        The Hive document is archived (isActive set to false).
        Returns 409 if the user is not currently paired.
      operationId: disconnectPair
      tags:
        - Profile & Settings
      responses:
        '200':
          description: Pair disconnected successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Pair disconnected
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User is not currently paired with anyone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Not paired — nothing to disconnect

  /pair/reconnect:
    post:
      summary: Reconnect with a partner
      description: |
        Re-pairs the current user with the same or a new partner.
        Provide either partnerCode (6-char alphanumeric) or partnerId (MongoDB ObjectId).
        Creates a new Pair document and a new Hive document.
        Returns the new hiveId on success.
      operationId: reconnectPair
      tags:
        - Profile & Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconnectPairRequest'
            example:
              partnerCode: AB12CD
      responses:
        '200':
          description: Successfully re-paired with partner.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Reconnected
                      hiveId:
                        type: string
                        example: hive_new_1
        '400':
          description: Validation error — invalid partnerCode format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Partner not found — invalid code or ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Partner not found for the provided code
