      operationId: getProfile
      tags:
        - Profile & Settings
      responses:
        '200':
          description: User profile returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
              example:
                id: user_demo_1
                firstName: Dana
                lastName: Hanin
                email: dana@2bee.app
                avatarUrl: null
                bio: ''
                pairId: user_demo_2
                hiveId: 64a1b2c3d4e5f6a7b8c9d0e1
                sharedCategories:
                  - groceries
                  - rent
                  - utilities
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update current user's profile
      description: Updates one or more profile fields (firstName, lastName, avatarUrl, bio).
      operationId: updateProfile
      tags:
        - Profile & Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              firstName: Dana
              lastName: Hanin
              bio: Saving for a vacation together.
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error — invalid field value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: String must contain at most 50 character(s)
                  details: null
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

