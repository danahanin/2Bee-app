openapi: 3.0.3

info:
  title: 2Bee API
  description: |
    API specification for the 2Bee shared finance application.
    Profile & Settings stubs live under /api (Dana Hanin).
    Dashboard & Analytics endpoints are at the server root (Mishelle — PR1).
    Remaining API groups will be added by each domain owner as per plan.md.
  version: 0.2.0

servers:
  - url: http://localhost:4000/api
    description: Profile API (path prefix /api)
  - url: http://localhost:4000
    description: Root API (dashboard, hive, expenses, auth)

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer access token (opaque session token) issued by POST /auth/login.
        Include as: Authorization: Bearer <token>

  # ---------------------------------------------------------------------------
  # Reusable schemas
  # ---------------------------------------------------------------------------
  schemas:

    PrivacySettings:
      type: object
      properties:
        hidePersonalIncome:
          type: boolean
          description: When true, the user's personal income is not visible to their partner.
          example: false
        hidePersonalExpenses:
          type: boolean
          description: When true, personal-type expenses are hidden from the partner.
          example: false
        hidePersonalBalance:
          type: boolean
          description: When true, personal account balance is hidden from the partner.
          example: false
      required:
        - hidePersonalIncome
        - hidePersonalExpenses
        - hidePersonalBalance

    NotificationSettings:
      type: object
      properties:
        budgetAlerts:
          type: boolean
          description: Notify when approaching or exceeding a budget limit.
          example: true
        imbalanceAlerts:
          type: boolean
          description: Notify when Hive contributions become imbalanced.
          example: true
        newExpenseAlerts:
          type: boolean
          description: Notify when partner adds a new shared expense.
          example: true
        weeklyDigest:
          type: boolean
          description: Send a weekly financial summary.
          example: false
      required:
        - budgetAlerts
        - imbalanceAlerts
        - newExpenseAlerts
        - weeklyDigest

    UserProfile:
      type: object
      properties:
        id:
          type: string
          example: user_demo_1
        firstName:
          type: string
          example: Dana
        lastName:
          type: string
          example: Hanin
        email:
          type: string
          format: email
          example: dana@2bee.app
        avatarUrl:
          type: string
          nullable: true
          example: null
        bio:
          type: string
          maxLength: 200
          example: ''
        pairId:
          type: string
          nullable: true
          description: Partner user ID, or null if unpaired.
          example: user_demo_2
        hiveId:
          type: string
          nullable: true
          example: 64a1b2c3d4e5f6a7b8c9d0e1
        sharedCategories:
          type: array
          items:
            type: string
          example:
            - groceries
            - rent
            - utilities

    UpdatePrivacySettingsRequest:
      type: object
      additionalProperties: false
      properties:
        hidePersonalIncome:
          type: boolean
          example: false
        hidePersonalExpenses:
          type: boolean
          example: false
        hidePersonalBalance:
          type: boolean
          example: false

    UpdateNotificationSettingsRequest:
      type: object
      additionalProperties: false
      properties:
        budgetAlerts:
          type: boolean
          example: true
        imbalanceAlerts:
          type: boolean
          example: true
        newExpenseAlerts:
          type: boolean
          example: true
        weeklyDigest:
          type: boolean
          example: false

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 50
          example: Dana
        lastName:
          type: string
          minLength: 1
          maxLength: 50
          example: Hanin
        avatarUrl:
          type: string
          nullable: true
          example: null
        bio:
          type: string
          maxLength: 200
          example: Saving for a vacation together.

    UpdateSharedCategoriesRequest:
      type: object
      required:
        - categories
      properties:
        categories:
          type: array
          items:
            type: string
            enum:
              - groceries
              - rent
              - utilities
              - dining
              - transport
              - entertainment
              - travel
              - health
              - subscriptions
              - shopping
          minItems: 0
          maxItems: 20
          example:
            - groceries
            - rent
            - utilities

    ReconnectPairRequest:
      type: object
      properties:
        partnerCode:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-character alphanumeric pair code generated by the partner.
          example: AB12CD
        partnerId:
          type: string
          description: Partner user ID (e.g. user_demo_2) or MongoDB ObjectId.
          example: user_demo_2
      description: Provide either partnerCode or partnerId — not both.

    AuthUser:
      type: object
      properties:
        id:
          type: string
          example: user_demo_1
        firstName:
          type: string
          example: Demo
        lastName:
          type: string
          example: User
        email:
          type: string
          format: email
          example: demo@2bee.app
        pairId:
          type: string
          nullable: true
          example: null
        hiveId:
          type: string
          nullable: true
          example: hive_demo_1
        createdAt:
          type: string
          format: date-time
          example: 2024-06-01T09:00:00.000Z
      required:
        - id
        - firstName
        - lastName
        - email
        - createdAt

    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
          example: Demo
        lastName:
          type: string
          minLength: 2
          maxLength: 50
          example: User
        email:
          type: string
          format: email
          example: demo@2bee.app
        password:
          type: string
          format: password
          minLength: 8
          example: hunter22

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: demo@2bee.app
        password:
          type: string
          format: password
          example: hunter22

    RegisterResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          example: 51e4b5830a2743aabf98c5404f4f894c
        expiresAt:
          type: string
          format: date-time
          example: 2024-06-01T09:15:00.000Z
        user:
          $ref: '#/components/schemas/AuthUser'

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: UNAUTHORIZED
            message:
              type: string
              example: Missing or invalid authorization token.
            details:
              type: object
              nullable: true
              additionalProperties:
                type: string

    Expense:
      type: object
      properties:
        _id:
          type: string
        hiveId:
          type: string
          nullable: true
        userId:
          type: string
        amount:
          type: number
          example: 150.00
        category:
          type: string
          enum:
            - groceries
            - dining
            - transport
            - utilities
            - rent
            - entertainment
            - health
            - shopping
            - subscriptions
            - travel
            - education
            - other
        description:
          type: string
          maxLength: 200
          example: Weekly groceries
        type:
          type: string
          enum: [personal, shared]
        source:
          type: string
          enum: [manual, bank_sync]
        date:
          type: string
          format: date-time
        isDeleted:
          type: boolean
        classifiedBy:
          type: string
          enum: [user, ai]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateExpenseRequest:
      type: object
      required:
        - amount
        - category
        - description
      properties:
        amount:
          type: number
          minimum: 0.01
          example: 150.00
        category:
          type: string
          enum:
            - groceries
            - dining
            - transport
            - utilities
            - rent
            - entertainment
            - health
            - shopping
            - subscriptions
            - travel
            - education
            - other
        description:
          type: string
          maxLength: 200
          example: Weekly groceries
        date:
          type: string
          format: date
          example: '2026-03-20'

    UpdateExpenseRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
        description:
          type: string
          maxLength: 200
        date:
          type: string
          format: date

    DashboardTopCategory:
      type: object
      nullable: true
      properties:
        category:
          type: string
          example: dining
        amount:
          type: number
          example: 245.5

    BudgetStatusItem:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        period:
          type: string
          enum: [monthly, weekly, yearly]
        type:
          type: string
          enum: [personal, shared]
        limit:
          type: number
        spent:
          type: number
        percentUsed:
          type: integer
          minimum: 0
          maximum: 100

    BudgetItem:
      allOf:
        - $ref: '#/components/schemas/BudgetStatusItem'
        - type: object
          properties:
            userId:
              type: string
            hiveId:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    BudgetListResponse:
      type: object
      properties:
        budgets:
          type: array
          items:
            $ref: '#/components/schemas/BudgetItem'

    CreateBudgetRequest:
      type: object
      required: [category, limit, period, type]
      properties:
        category:
          type: string
        limit:
          type: number
          minimum: 0.01
        period:
          type: string
          enum: [monthly, weekly, yearly]
        type:
          type: string
          enum: [personal, shared]

    UpdateBudgetRequest:
      type: object
      properties:
        category:
          type: string
        limit:
          type: number
          minimum: 0.01
        period:
          type: string
          enum: [monthly, weekly, yearly]

    DeleteBudgetResponse:
      type: object
      properties:
        deleted:
          type: boolean
        id:
          type: string

    GoalItem:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        hiveId:
          type: string
          nullable: true
        title:
          type: string
        targetAmount:
          type: number
        currentAmount:
          type: number
        deadline:
          type: string
          format: date-time
        category:
          type: string
          nullable: true
        progressPercent:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GoalListResponse:
      type: object
      properties:
        goals:
          type: array
          items:
            $ref: '#/components/schemas/GoalItem'

    CreateGoalRequest:
      type: object
      required: [title, targetAmount, deadline]
      properties:
        title:
          type: string
          maxLength: 120
        targetAmount:
          type: number
          minimum: 0.01
        currentAmount:
          type: number
          minimum: 0
        deadline:
          type: string
          format: date-time
        category:
          type: string
        hiveId:
          type: string
          nullable: true

    PersonalDashboardResponse:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        hiveId:
          type: string
          nullable: true
        totalSpendThisMonth:
          type: number
        topCategory:
          $ref: '#/components/schemas/DashboardTopCategory'
        budgetStatus:
          type: array
          items:
            $ref: '#/components/schemas/BudgetStatusItem'
        insightPlaceholder:
          type: string
          nullable: true
          description: Reserved for PR5 — embedded AI insight.

    SharedDashboardContribution:
      type: object
      properties:
        userId:
          type: string
        total:
          type: number

    SpendingBreakdownItem:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        percent:
          type: number

    SpendingBreakdownResponse:
      type: object
      properties:
        type:
          type: string
          enum: [personal, shared]
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        total:
          type: number
        breakdown:
          type: array
          items:
            $ref: '#/components/schemas/SpendingBreakdownItem'
        message:
          type: string
          nullable: true

    TrendSeriesItem:
      type: object
      properties:
        category:
          type: string
        data:
          type: array
          items:
            type: number
        trend:
          type: string
          enum: [up, down, stable]

    TrendsResponse:
      type: object
      properties:
        type:
          type: string
          enum: [personal, shared]
        months:
          type: array
          items:
            type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        series:
          type: array
          items:
            $ref: '#/components/schemas/TrendSeriesItem'
        message:
          type: string
          nullable: true

    ComparisonCategoryItem:
      type: object
      properties:
        category:
          type: string
        current:
          type: number
        previous:
          type: number
        changePercent:
          type: number
          nullable: true

    ComparisonMonthBlock:
      type: object
      properties:
        key:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        total:
          type: number
        byCategory:
          type: object
          additionalProperties:
            type: number

    ComparisonResponse:
      type: object
      properties:
        type:
          type: string
          enum: [personal, shared]
        currentMonth:
          $ref: '#/components/schemas/ComparisonMonthBlock'
        previousMonth:
          $ref: '#/components/schemas/ComparisonMonthBlock'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/ComparisonCategoryItem'
        forecast:
          type: object
          nullable: true
        forecastNote:
          type: string
        message:
          type: string
          nullable: true

    SharedDashboardResponse:
      type: object
      properties:
        paired:
          type: boolean
        period:
          type: object
          nullable: true
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        hiveId:
          type: string
          nullable: true
        totalJointSpendThisMonth:
          type: number
        topSharedCategory:
          $ref: '#/components/schemas/DashboardTopCategory'
        contributions:
          type: array
          items:
            $ref: '#/components/schemas/SharedDashboardContribution'
        sharedBudgetStatus:
          type: array
          items:
            $ref: '#/components/schemas/BudgetStatusItem'
        message:
          type: string
          nullable: true
          description: Present when the user has no hive.

# ---------------------------------------------------------------------------
# Apply bearer auth globally to all endpoints
# ---------------------------------------------------------------------------
security:
  - bearerAuth: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # --------------------------------------------------------------------------
  # Authentication — Bar Cohen (PR1)
  # --------------------------------------------------------------------------
  /auth/register:
    post:
      summary: Register a new user account
      description: Creates an account with hashed password storage and returns the sanitized user profile.
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login with email and password
      description: Verifies credentials with bcrypt and issues a short-lived access token.
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Credentials verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout and invalidate the current access token
      description: Accepts the Bearer token and removes the associated session record.
      operationId: logoutUser
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session invalidated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Missing token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Dashboard & Analytics (Mishelle — PR1)
  # --------------------------------------------------------------------------
  /dashboard/personal:
    servers:
      - url: http://localhost:4000
    get:
      summary: Personal dashboard summary
      description: |
        Aggregates the current user's personal expenses for the current calendar month (UTC),
        top spending category, and budget rollups. AI insight embedding is added in PR5.
      operationId: getDashboardPersonal
      tags:
        - Dashboard & Analytics
      responses:
        '200':
          description: Personal dashboard summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalDashboardResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /dashboard/shared:
    servers:
      - url: http://localhost:4000
    get:
      summary: Shared (Hive) dashboard summary
      description: |
        Joint spending for the current month, per-partner contributions, and shared budgets.
        When the user has no hive, returns paired=false and a short message.
      operationId: getDashboardShared
      tags:
        - Dashboard & Analytics
      responses:
        '200':
          description: Shared dashboard summary or unpaired placeholder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedDashboardResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Hive not found or user is not a member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analytics/spending-breakdown:
    servers:
      - url: http://localhost:4000
    get:
      summary: Spending breakdown by category
      description: Groups expenses by category for the given date range and expense type.
      operationId: getAnalyticsSpendingBreakdown
      tags:
        - Dashboard & Analytics
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [personal, shared]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: userId
          in: query
          description: Partner may pass paired user id for personal analytics.
          schema:
            type: string
      responses:
        '200':
          description: Category breakdown for the range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpendingBreakdownResponse'
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not allowed to view requested user data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analytics/trends:
    servers:
      - url: http://localhost:4000
    get:
      summary: Month-over-month spending trends
      description: Returns per-category spend series across recent months with trend direction.
      operationId: getAnalyticsTrends
      tags:
        - Dashboard & Analytics
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [personal, shared]
        - name: months
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 24
            default: 6
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: userId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Trend series by category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendsResponse'
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not allowed to view requested user data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /analytics/comparison:
    servers:
      - url: http://localhost:4000
    get:
      summary: Current vs previous month comparison
      description: Compares current UTC month spend to the previous month. Forecast field is reserved for AI integration.
      operationId: getAnalyticsComparison
      tags:
        - Dashboard & Analytics
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [personal, shared]
        - name: userId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Month comparison payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonResponse'
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not allowed to view requested user data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Budgets & Goals (Mishelle — PR4)
  # --------------------------------------------------------------------------
  /budgets:
    servers:
      - url: http://localhost:4000
    get:
      summary: List budgets
      description: Returns budgets for the current user with current-month spend rollups.
      operationId: listBudgets
      tags:
        - Budgets & Goals
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [personal, shared]
      responses:
        '200':
          description: Budget list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetListResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create budget
      operationId: createBudget
      tags:
        - Budgets & Goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetRequest'
      responses:
        '201':
          description: Budget created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetItem'
        '400':
          description: Validation error or missing hive for shared budget.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
