        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated personal expense list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Expense'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  totalPages:
                    type: integer
        '401':
          description: Missing or invalid token.

  # --------------------------------------------------------------------------
  # Pairing management (continued)
  # --------------------------------------------------------------------------
  /pair/reconnect:
    post:
      summary: Reconnect with a partner
      description: |
        Re-pairs the current user with the same or a new partner.
        Provide either partnerCode (6-char alphanumeric) or partnerId (MongoDB ObjectId).
        Creates a new Hive and links both users via pairId/hiveId fields.
        Returns the new hiveId on success.
      operationId: reconnectPair
      tags:
        - Profile & Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconnectPairRequest'
            example:
              partnerCode: AB12CD
      responses:
        '200':
          description: Successfully re-paired with partner.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Reconnected
                      hiveId:
                        type: string
                        example: 64a1b2c3d4e5f6a7b8c9d0e1
        '400':
          description: Validation error — invalid partnerCode format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authorization token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Partner not found — invalid code or ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: PARTNER_NOT_FOUND
                  message: Partner was not found.
                  details: null
